{{- range $name, $role := .Values.roles }}
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ $role.name | default $name }}
  {{- with $role.labels }}
  labels:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  {{- with $role.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
rules:
  {{- toYaml $role.rules | nindent 2 }}
---
{{- end }}
